version: '3.9'

services:
  postgres:
  image: postgres:16-alpine
  container_name: tripplesph_postgres
  restart: unless-stopped
  environment:
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
  ports:
    - "5432:5432"
  volumes:
    - postgres_data:/var/lib/postgresql/data
  networks:
    -tripplesph_net
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
    interval: 10s
    timeout: 5s
    retries: 5
# redis caching
redis:
  image: redis:7-alpine
  container_name: tripplesph_redis
  restart: unless-stopped
  ports:
    - "6379:6379"
  volumes:
    - redis_data:/data
  networks:
    - tripplesph_net
  command: redis-server --appendonly yes
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
# backend
server:
  build:
    context: ./server
    dockerfile: Dockerfile
    container_name: tripplesph_server
    restart: unless-stopped
    depends-on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      environment:
        DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        REDIS_URL: redis://redis:6379
        JWT_SECRET: ${JWT_SECRET}
        NODE_ENV: development
      ports:
        - "3001:3001"
      volumes:
        - ./server:/app
        - /app/node_modules
      networks:
      - tripplesph_net
# client - frontend
client:
  build:
    context: ./client
    dockerfile: Dockerfile
  container_name: tripplesph_client
  restart: unless-stopped
  depends_on:
    - server
  ports:
    - "3000:3000"
  volumes:
    - ./client:/app
    - /app/node_modules
  networks:
    - tripplesph_net

volumes:
  postgres_data:
  redis_data:

networks:
  tripplesph_net:
    driver: bridge

